<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MANGIFERA</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Special+Gothic+Condensed+One&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: black;
      overflow-x: hidden;
      font-family: 'Special Gothic Condensed One', serif;
    }

    /* Fixed canvas layer */
    #canvas-stage {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 1;
    }

    .canvas-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }

    .canvas-layer.active {
      opacity: 1;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .canvas-layer canvas {
      filter: brightness(0.5);
    }

    /* Scroll container */
    #scroll-container {
      position: relative;
      z-index: 2;
      will-change: transform;
    }

    /* ALL sections equal height: 500vh each (doubled from 250vh) */
    .section {
      position: relative;
      height: 500vh;
    }

    /* Fixed text layer */
    #text-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100vh;
      pointer-events: none;
      z-index: 10;
    }

    .text-content {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 100%;
      text-align: center;
      color: white;
      text-shadow: 0 0 40px rgba(0,0,0,0.95), 
                   0 0 80px rgba(0,0,0,0.8),
                   0 4px 20px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      will-change: opacity;
    }

    .text-content.visible {
      opacity: 1;
    }

    .overlay {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 3px;
      margin: 0;
      padding: 0 20px;
    }

    .overlay.big {
      font-size: 6rem;
      margin-bottom: 0.5rem;
      letter-spacing: 12px;
      line-height: 1.2;
    }

    .overlay.huge {
      font-size: 4rem;
      letter-spacing: 6px;
      line-height: 1.3;
    }

    .overlay.sub {
      font-size: 2rem;
      margin-top: 1rem;
      opacity: 0.9;
      letter-spacing: 4px;
    }

    .loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      z-index: 999;
      font-size: 1.5rem;
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      background: rgba(0,0,0,0.7);
      padding: 1rem 2rem;
      border-radius: 40px;
      font-family: monospace;
    }

    .loading.show {
      opacity: 1;
    }

    html, body {
      overflow-x: hidden;
    }
  </style>
</head>
<body>

  <div class="loading" id="loading">Loading immersive layers...</div>

  <!-- Fixed canvas stage -->
  <div id="canvas-stage">
    <div class="canvas-layer" data-scene="0">
      <canvas id="canvas-0"></canvas>
    </div>
    <div class="canvas-layer" data-scene="1">
      <canvas id="canvas-1"></canvas>
    </div>
    <div class="canvas-layer" data-scene="2">
      <canvas id="canvas-2"></canvas>
    </div>
    <div class="canvas-layer" data-scene="3">
      <canvas id="canvas-3"></canvas>
    </div>
  </div>

  <!-- Fixed text layer -->
  <div id="text-layer">
    <div class="text-content" id="text-0">
      <div class="overlay">Some memories never fade...</div>
    </div>
    <div class="text-content" id="text-1">
      <div class="overlay big">"MANGO"</div>
      <div class="overlay">Some names stay forever…</div>
    </div>
    <div class="text-content" id="text-2">
      <div class="overlay">You never really moved on… did you?</div>
    </div>
    <div class="text-content" id="text-3">
      <div class="overlay huge">YOU ARE THE MANGO</div>
      <div class="overlay sub">and you always will be</div>
    </div>
  </div>

  <!-- Scrollable sections -->
  <div id="scroll-container">
    <section class="section" data-scene="0"></section>
    <section class="section" data-scene="1"></section>
    <section class="section" data-scene="2"></section>
    <section class="section" data-scene="3"></section>
  </div>

  <script>
    (function() {
      // ----- SMOOTH SCROLL ENGINE -----
      let current = 0;
      let target = 0;
      const ease = 0.075;
      const container = document.getElementById("scroll-container");
      const loadingEl = document.getElementById("loading");
      
      // CRITICAL: Body height exactly equals container's scroll height
      function setBodyHeight() {
        if (container) {
          const containerHeight = container.scrollHeight;
          document.body.style.height = containerHeight + "px";
          document.body.style.margin = "0";
          document.body.style.padding = "0";
        }
      }
      
      setBodyHeight();
      
      window.addEventListener("resize", () => {
        setTimeout(setBodyHeight, 30);
      });
      
      window.addEventListener("load", () => {
        setBodyHeight();
        const maxScroll = document.body.scrollHeight - window.innerHeight;
        target = Math.min(window.scrollY, maxScroll);
        current = Math.min(current, maxScroll);
      });

      window.addEventListener("scroll", () => {
        target = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;
        if (target > maxScroll) target = maxScroll;
        if (target < 0) target = 0;
      });

      function smoothScroll() {
        const maxScroll = document.body.scrollHeight - window.innerHeight;
        let clampedTarget = Math.min(Math.max(target, 0), maxScroll);
        
        current += (clampedTarget - current) * ease;
        
        if (Math.abs(clampedTarget - current) < 0.1) {
          current = clampedTarget;
        }
        
        container.style.transform = `translateY(${-current}px)`;
        requestAnimationFrame(smoothScroll);
      }
      smoothScroll();

      // ----- CANVAS PARALLAX SETUP -----
      const sections = document.querySelectorAll('.section');
      const canvasLayers = document.querySelectorAll('.canvas-layer');
      const canvases = {
        0: document.getElementById('canvas-0'),
        1: document.getElementById('canvas-1'),
        2: document.getElementById('canvas-2'),
        3: document.getElementById('canvas-3')
      };
      
      const textContents = {
        0: document.getElementById('text-0'),
        1: document.getElementById('text-1'),
        2: document.getElementById('text-2'),
        3: document.getElementById('text-3')
      };

      const folders = [
        './scene_1/layers',
        './scene_2/layers',
        './scene_3/layers',
        './scene_4/layers'
      ];
      const LAYER_COUNT = 6;
      
      const scenes = [];
      let imagesLoaded = 0;
      const totalImages = folders.length * LAYER_COUNT;

      if (totalImages > 0) {
        loadingEl.classList.add('show');
      }

      function getCover(img, canvas) {
        const imgAspect = img.width / img.height;
        const canvasAspect = canvas.width / canvas.height;
        let w, h;
        
        if (imgAspect > canvasAspect) {
          h = canvas.height;
          w = h * imgAspect;
        } else {
          w = canvas.width;
          h = w / imgAspect;
        }
        
        const x = (canvas.width - w) / 2;
        const y = (canvas.height - h) / 2;
        return { w, h, x, y };
      }

      function createFallbackLayer(sceneIdx, layerIdx) {
        const canvas = document.createElement('canvas');
        canvas.width = 1920;
        canvas.height = 1080;
        const ctx = canvas.getContext('2d');
        const hue = (sceneIdx * 90 + layerIdx * 15) % 360;
        const lightness = 25 + layerIdx * 8;
        ctx.fillStyle = `hsl(${hue}, 65%, ${lightness}%)`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 0.15;
        for (let i = 0; i < 50; i++) {
          ctx.fillStyle = `hsl(${hue + 30}, 80%, 70%)`;
          ctx.fillRect(Math.random() * canvas.width, Math.random() * canvas.height, 4, 4);
        }
        const img = new Image();
        img.src = canvas.toDataURL();
        return img;
      }

      async function loadAllScenes() {
        for (let i = 0; i < folders.length; i++) {
          const canvas = canvases[i];
          if (!canvas) continue;
          
          const ctx = canvas.getContext('2d');
          const layers = [];

          function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          }
          resizeCanvas();
          
          const resizeHandler = () => {
            resizeCanvas();
          };
          window.addEventListener('resize', resizeHandler);

          const promises = [];
          
          for (let j = 0; j < LAYER_COUNT; j++) {
            const img = new Image();
            const layerPath = `${folders[i]}/layer_${j}.png`;
            img.src = layerPath;

            promises.push(new Promise((res) => {
              const timeout = setTimeout(() => {
                const fallbackImg = createFallbackLayer(i, j);
                layers.push({ img: fallbackImg, depth: j / LAYER_COUNT });
                imagesLoaded++;
                if (imagesLoaded === totalImages) {
                  loadingEl.classList.remove('show');
                }
                res();
              }, 25000);
              
              img.onload = () => {
                clearTimeout(timeout);
                layers.push({ img, depth: j / LAYER_COUNT });
                imagesLoaded++;
                if (imagesLoaded === totalImages) {
                  loadingEl.classList.remove('show');
                }
                res();
              };
              img.onerror = () => {
                clearTimeout(timeout);
                const fallbackImg = createFallbackLayer(i, j);
                layers.push({ img: fallbackImg, depth: j / LAYER_COUNT });
                imagesLoaded++;
                if (imagesLoaded === totalImages) {
                  loadingEl.classList.remove('show');
                }
                res();
              };
            }));
          }

          await Promise.all(promises);
          layers.sort((a, b) => a.depth - b.depth);

          scenes.push({
            ctx,
            canvas,
            layers,
            smoothProgress: 0,
            resizeHandler,
          });
        }

        if (canvasLayers[0]) canvasLayers[0].classList.add('active');
        requestAnimationFrame(render);
      }

      let prevActiveScene = 0;
      
      function render() {
        let activeSceneIndex = 0;
        const viewportTop = current;
        const viewportMiddle = viewportTop + window.innerHeight / 2;
        
        let found = false;
        sections.forEach((section, idx) => {
          const rect = section.getBoundingClientRect();
          const sectionTop = rect.top + viewportTop;
          const sectionBottom = sectionTop + rect.height;

          if (viewportMiddle >= sectionTop && viewportMiddle < sectionBottom) {
            activeSceneIndex = idx;
            found = true;
          }
        });

        if (!found && sections.length > 0) {
          const lastSection = sections[sections.length - 1];
          const lastRect = lastSection.getBoundingClientRect();
          const lastTop = lastRect.top + viewportTop;
          if (viewportTop >= lastTop + lastRect.height - window.innerHeight) {
            activeSceneIndex = sections.length - 1;
          } else {
            activeSceneIndex = 0;
          }
        }
        
        if (activeSceneIndex !== prevActiveScene) {
          canvasLayers.forEach((layer, idx) => {
            if (idx === activeSceneIndex) {
              layer.style.opacity = '1';
              layer.classList.add('active');
            } else if (idx === prevActiveScene) {
              layer.style.opacity = '0';
              setTimeout(() => {
                if (layer.classList.contains('active')) {
                  layer.classList.remove('active');
                }
              }, 800);
            }
          });
          prevActiveScene = activeSceneIndex;
        }
        
        // ----- TEXT VISIBILITY WITH STICKY MIDDLE PERIOD -----
        // Each section is 500vh with timing:
        // 0-25%: Fade in + parallax movement
        // 25-75%: STICKY (image and text stay fixed at center)
        // 75-100%: Fade out + transition to next
        sections.forEach((section, idx) => {
          const rect = section.getBoundingClientRect();
          const sectionTop = rect.top + viewportTop;
          const sectionHeight = rect.height;
          
          let sectionProgress = 0;
          if (sectionHeight > 0) {
            sectionProgress = (viewportTop - sectionTop) / sectionHeight;
            sectionProgress = Math.min(Math.max(sectionProgress, 0), 1);
          }
          
          const textEl = textContents[idx];
          if (!textEl) return;
          
          let opacity = 0;
          
          // New timing for all scenes with sticky middle
          const fadeInEnd = 0.15;      // Fade in completes at 15%
          const stickyStart = 0.25;    // Sticky period starts at 25%
          const stickyEnd = 0.75;      // Sticky period ends at 75%
          const fadeOutEnd = 0.90;     // Fade out completes at 90%
          
          if (sectionProgress < fadeInEnd) {
            // Fade in phase
            const t = sectionProgress / fadeInEnd;
            opacity = Math.min(1, t);
          } else if (sectionProgress < stickyStart) {
            // Transition to sticky
            opacity = 1;
          } else if (sectionProgress < stickyEnd) {
            // STICKY PERIOD - stay at full opacity
            opacity = 1;
          } else if (sectionProgress < fadeOutEnd) {
            // Fade out phase
            const t = (sectionProgress - stickyEnd) / (fadeOutEnd - stickyEnd);
            opacity = 1 - t;
          } else {
            // Fully faded out
            opacity = 0;
          }
          
          textEl.style.opacity = opacity;
          if (opacity > 0.01) {
            textEl.classList.add('visible');
          } else {
            textEl.classList.remove('visible');
          }
          
          textEl.style.transform = 'translate(-50%, -50%)';
        });
        
        // ----- RENDER PARALLAX WITH STICKY MIDDLE -----
        scenes.forEach((scene, idx) => {
          const { ctx, canvas, layers } = scene;
          if (!ctx || !canvas) return;
          
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          
          const section = sections[idx];
          if (!section) return;
          
          const rect = section.getBoundingClientRect();
          const sectionTop = rect.top + viewportTop;
          const sectionHeight = rect.height;
          
          let progress = (viewportTop - sectionTop) / sectionHeight;
          progress = Math.min(Math.max(progress, 0), 1);
          
          // Map progress to parallax movement with sticky middle
          // 0-25%: parallax moves from start (1.0) to center (0.5)
          // 25-75%: STICKY at center (0.5)
          // 75-100%: parallax moves from center (0.5) to end (0.0)
          let parallaxProgress = progress;
          
          if (progress <= 0.25) {
            // First quarter: move from 1.0 to 0.5
            parallaxProgress = 1.0 - (progress / 0.25) * 0.5;
          } else if (progress <= 0.75) {
            // Middle half: STICKY at 0.5
            parallaxProgress = 0.5;
          } else {
            // Last quarter: move from 0.5 to 0.0
            parallaxProgress = 0.5 - ((progress - 0.75) / 0.25) * 0.5;
          }
          
          const delta = parallaxProgress - scene.smoothProgress;
          const dynamicEase = 0.06;
          scene.smoothProgress += delta * dynamicEase;
          const smooth = Math.min(Math.max(scene.smoothProgress, 0), 1);
          
          const strengthX = 55;
          const strengthY = 16;
          const scaleBoost = 0.0018;
          
          for (let i = layers.length - 1; i >= 0; i--) {
            const layer = layers[i];
            const { img } = layer;
            if (!img || !img.complete) continue;
            
            const depth = 1 - (i / layers.length);
            const { w, h, x, y } = getCover(img, canvas);
            
            const dx = (1 - smooth) * -strengthX * depth * (0.7 + depth * 0.3);
            const dy = (1 - smooth) * -strengthY * depth;
            const scale = 1 + (1 - depth) * scaleBoost;
            
            const sw = w * scale;
            const sh = h * scale;
            const sx = x + dx - (sw - w) / 2;
            const sy = y + dy - (sh - h) / 2;
            
            if (depth > 0.4) {
              const rotation = (1 - smooth) * 0.2 * (idx % 2 === 0 ? 0.6 : -0.6);
              ctx.save();
              ctx.translate(canvas.width / 2, canvas.height / 2);
              ctx.rotate(rotation * depth * 0.01);
              ctx.translate(-canvas.width / 2, -canvas.height / 2);
              ctx.drawImage(img, sx, sy, sw, sh);
              ctx.restore();
            } else {
              ctx.drawImage(img, sx, sy, sw, sh);
            }
          }
          
          const gradient = ctx.createRadialGradient(
            canvas.width / 2, canvas.height / 2, 0,
            canvas.width / 2, canvas.height / 2, canvas.width / 1.5
          );
          const vignetteStrength = 0.22 + (1 - smooth) * 0.1;
          gradient.addColorStop(0, 'rgba(0,0,0,0)');
          gradient.addColorStop(1, `rgba(0,0,0,${vignetteStrength})`);
          ctx.fillStyle = gradient;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        });
        
        requestAnimationFrame(render);
      }

      loadAllScenes();
      
      window.addEventListener('orientationchange', () => {
        setTimeout(() => {
          scenes.forEach(scene => {
            if (scene.resizeHandler) {
              if (scene.canvas) {
                scene.canvas.width = window.innerWidth;
                scene.canvas.height = window.innerHeight;
              }
            }
          });
          setBodyHeight();
          const maxScroll = document.body.scrollHeight - window.innerHeight;
          target = window.scrollY;
          current = Math.min(current, maxScroll);
        }, 100);
      });
      
      const observer = new ResizeObserver(() => {
        setBodyHeight();
      });
      if (container) observer.observe(container);
      
      // Log for verification
      setTimeout(() => {
        console.log(`✅ All sections: 500vh each (doubled from original 250vh)`);
        console.log(`🎯 Timing: 0-25% parallax in → 25-75% STICKY → 75-100% parallax out`);
        console.log(`📐 Total scroll height: ${document.body.scrollHeight}px`);
        console.log(`✨ No trailing space - page ends after scene 3`);
      }, 500);
    })();
  </script>
</body>
</html>
